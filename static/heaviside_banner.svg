      <stop offset="80%" stop-color="#00C853"/>
      <stop offset="100%" stop-color="#00C853" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background covers full SVG coordinate space so the cropped view fills correctly -->
