<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 888 4800 1024"
     width="4800" height="1024">

  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="70%" fx="50%" fy="40%">
      <stop offset="0%" stop-color="#1E2244"/>
      <stop offset="100%" stop-color="#0D0D1A"/>
    </radialGradient>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ACC1" stop-opacity="0.5"/>
      <stop offset="20%" stop-color="#00BCD4"/>
